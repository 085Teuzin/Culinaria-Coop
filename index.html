<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Culinária Sob Pressão PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: system-ui, sans-serif; overflow: hidden; background: #09090b; }
        .kitchen-gradient { background: radial-gradient(circle at center, #18181b 0%, #000 100%); }
        .counter-top { background: #3f3f46; border-top: 4px solid #71717a; position: relative; }
        .flying-item { 
            position: absolute; left: 50%; bottom: 20px; font-size: 2.5rem;
            pointer-events: none; will-change: transform, opacity;
            animation: flyUp 0.4s ease-out forwards;
        }
        @keyframes flyUp {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -180px) scale(0.5); opacity: 0; }
        }
        #timer-fill { transition: width 0.1s linear; }
    </style>
</head>
<body class="kitchen-gradient h-screen text-zinc-100 select-none">

    <div id="setup" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-zinc-950 p-6 text-center">
        <h1 class="text-4xl font-black text-orange-500 mb-2 italic tracking-tighter">KITCHEN PANIC</h1>
        <div id="status" class="mb-6 text-orange-400 font-mono text-xs uppercase tracking-widest">Aguardando Conexão...</div>
        
        <div class="w-full max-w-sm space-y-4">
            <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 shadow-2xl">
                <span class="text-[10px] block mb-2 font-bold text-zinc-500 uppercase italic">ID da sua Cozinha</span>
                <div id="my-id" class="text-lg font-mono font-bold text-blue-400 mb-4 break-all">...</div>
                <button id="btn-copy" class="w-full bg-zinc-800 py-3 rounded-xl font-bold border border-zinc-700 active:bg-zinc-700">COPIAR ID</button>
            </div>
            <input id="join-id" type="text" placeholder="ID do Amigo" class="w-full p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-center outline-none focus:border-orange-500">
            <button id="btn-connect" class="w-full bg-orange-600 py-4 rounded-2xl font-black text-lg active:scale-95 transition-all">CONECTAR</button>
        </div>
    </div>

    <div id="game" class="hidden h-screen flex flex-col max-w-md mx-auto relative">
        <div class="h-[12%] flex items-center justify-between px-6 pt-2">
            <div>
                <span class="text-[10px] text-zinc-500 font-bold uppercase block">Score</span>
                <div id="score" class="text-3xl font-black text-orange-500 tracking-tighter">0</div>
            </div>
            <div class="flex flex-col items-end w-1/2">
                <span class="text-[10px] text-zinc-500 font-bold uppercase mb-1">Tempo Limite</span>
                <div class="w-full h-3 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                    <div id="timer-fill" class="h-full bg-green-500 w-full"></div>
                </div>
            </div>
        </div>

        <div class="h-[20%] flex flex-col items-center justify-center relative px-4 text-center">
            <div class="bg-zinc-800/50 backdrop-blur-sm w-full py-4 rounded-3xl border border-white/5 flex flex-col items-center shadow-xl">
                <div class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1">Receita do Cliente</div>
                <div id="order-box" class="text-3xl tracking-tighter drop-shadow-lg"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div class="w-[85%] aspect-square counter-top rounded-[2.5rem] shadow-2xl flex flex-col items-center justify-center border-b-8 border-zinc-900">
                <div id="plate" class="text-4xl flex gap-1 flex-wrap justify-center items-center p-4"></div>
                <div id="anim-layer" class="absolute inset-0 pointer-events-none"></div>
            </div>
        </div>

        <div class="h-[38%] p-4 flex flex-col gap-3 bg-zinc-950/90 rounded-t-[2.5rem] border-t border-white/10">
            <div id="role-tag" class="text-center text-[10px] font-black text-zinc-500 uppercase tracking-widest">Iniciando...</div>
            <div id="hud-buttons" class="grid grid-cols-3 gap-2 h-20"></div>
            <div id="special-action" class="h-16"></div>
        </div>
    </div>

    <script>
        let peer = new Peer();
        let conn = null;
        let role = '';
        
        const STATE = {
            score: 0,
            plate: [],
            order: [],
            orderStartTime: 0,
            duration: 10000,
            active: false
        };

        // Layout de Controles conforme pedido
        const CONTROLS = {
            HOST: { items: ['🍞', '🔥'], action: '🥪' },
            GUEST: { items: ['🧀', '🥚', '🍅', '🧅', '🥬'], action: null }
        };

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        document.getElementById('btn-copy').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('my-id').innerText);
            alert("Copiado!");
        };

        document.getElementById('btn-connect').onclick = () => {
            conn = peer.connect(document.getElementById('join-id').value, { reliable: true });
            role = 'GUEST';
            setupConnection();
        };

        peer.on('connection', c => {
            conn = c;
            role = 'HOST';
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                renderHUD();
                if(role === 'HOST') startNewRound();
                requestAnimationFrame(gameLoop);
            });

            conn.on('data', data => {
                if (role === 'GUEST' && data.type === 'SYNC') {
                    Object.assign(STATE, data.state);
                    renderUI();
                }
                if (role === 'HOST' && data.type === 'INPUT') handleInput(data.item);
                if (role === 'HOST' && data.type === 'TRY_SERVE') checkFinalServe();
            });
        }

        function renderHUD() {
            const container = document.getElementById('hud-buttons');
            const special = document.getElementById('special-action');
            const myConfig = CONTROLS[role];
            
            container.innerHTML = '';
            myConfig.items.forEach(emoji => {
                const btn = createBtn(emoji, "bg-zinc-800 text-3xl", () => {
                    if(role === 'GUEST') conn.send({ type: 'INPUT', item: emoji });
                    else handleInput(emoji);
                    showFlyAnim(emoji);
                });
                container.appendChild(btn);
            });

            if (myConfig.action) {
                const serveBtn = createBtn(myConfig.action + " ENTREGAR", "bg-green-600 text-xl font-black w-full", () => {
                    checkFinalServe();
                });
                special.appendChild(serveBtn);
            }
            document.getElementById('role-tag').innerText = role === 'HOST' ? 'Chef Host: Massas e Entrega' : 'Chef Guest: Recheios';
        }

        function createBtn(text, cls, cb) {
            const b = document.createElement('button');
            b.className = `${cls} rounded-2xl shadow-[0_4px_0_0_#000] active:translate-y-1 active:shadow-none transition-all border border-white/5`;
            b.innerText = text;
            b.addEventListener('pointerdown', (e) => { e.preventDefault(); cb(); });
            return b;
        }

        function startNewRound() {
            const pool = ['🧀', '🥚', '🍅', '🧅', '🥬'];
            let newOrder = ['🍞'];
            const extraSize = Math.floor(Math.random() * 3) + 1; // 1 a 3 ingredientes de recheio
            for(let i=0; i<extraSize; i++) newOrder.push(pool[Math.floor(Math.random()*pool.length)]);
            newOrder.push('🍞'); // Pão no final
            
            STATE.order = newOrder;
            STATE.plate = [];
            STATE.orderStartTime = Date.now();
            STATE.active = true;
            broadcast();
            renderUI();
        }

        function handleInput(item) {
            if(!STATE.active) return;
            STATE.plate.push(item);
            
            // Validação instantânea de erro se exceder tamanho ou se for pão no meio errado
            if (STATE.plate.length > STATE.order.length) {
                fail("Ingredientes demais!");
            } else {
                broadcast();
                renderUI();
            }
        }

        function checkFinalServe() {
            if(!STATE.active) return;
            const isCorrect = JSON.stringify(STATE.plate) === JSON.stringify(STATE.order);
            if (isCorrect) {
                STATE.score += 5;
                STATE.active = false;
                renderUI();
                setTimeout(startNewRound, 600);
            } else {
                fail("Receita incorreta!");
            }
        }

        function fail(reason) {
            STATE.score = Math.max(0, STATE.score - 5);
            STATE.active = false;
            renderUI();
            setTimeout(startNewRound, 600);
        }

        function broadcast() {
            if(role === 'HOST' && conn.open) conn.send({ type: 'SYNC', state: STATE });
        }

        function showFlyAnim(emoji) {
            const el = document.createElement('div');
            el.className = 'flying-item';
            el.innerText = emoji;
            document.getElementById('anim-layer').appendChild(el);
            setTimeout(() => el.remove(), 400);
        }

        function renderUI() {
            document.getElementById('score').innerText = STATE.score;
            document.getElementById('order-box').innerText = STATE.order.join(' ');
            document.getElementById('plate').innerText = STATE.plate.join(' ');
        }

        function gameLoop() {
            if (STATE.active) {
                const elapsed = Date.now() - STATE.orderStartTime;
                const pct = Math.max(0, 100 - (elapsed / STATE.duration * 100));
                const bar = document.getElementById('timer-fill');
                bar.style.width = pct + '%';
                
                if(pct < 25) bar.className = "h-full bg-red-600 w-full";
                else if(pct < 50) bar.className = "h-full bg-yellow-500 w-full";
                else bar.className = "h-full bg-green-500 w-full";

                if (elapsed >= STATE.duration && role === 'HOST') fail("Tempo esgotado!");
            }
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
