<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Culinária Coop - @085_Teuzinnn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body{background:#050505;touch-action:manipulation;overflow:hidden;height:100vh;display:flex;flex-direction:column}
        .tap-effect:active{transform:scale(0.95)}
        .p-bar{transition:width linear}
        .panic-mode{animation:pulse-red 0.5s infinite}
        @keyframes pulse-red{0%{box-shadow:inset 0 0 40px rgba(220,38,38,0.3)}50%{box-shadow:inset 0 0 40px rgba(220,38,38,0.6)}100%{box-shadow:inset 0 0 40px rgba(220,38,38,0.3)}}
        #waiting-screen{backdrop-filter:blur(10px)}
    </style>
</head>
<body class="text-stone-100 font-sans select-none">
    <div id="toast-container" class="fixed top-4 left-0 right-0 z-[100] flex flex-col items-center gap-2"></div>
    
    <div id="setup-screen" class="fixed inset-0 z-50 bg-[#0a0a0a] flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8"><h1 class="text-5xl font-black text-red-700 italic tracking-tighter">CULINÁRIA CHAOS</h1><p class="text-red-500 text-[10px] font-black tracking-widest mt-1 uppercase">Made By: @085_Teuzinnn</p></div>
        <div class="space-y-4 w-full max-w-xs">
            <input id="room-name" type="text" placeholder="ID DA COZINHA" class="w-full bg-stone-900 border-2 border-red-900/50 py-4 px-4 rounded-xl outline-none focus:border-red-600 text-center font-black text-white">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="startSession('host')" class="bg-red-700 text-white py-4 rounded-xl font-black shadow-[0_4px_0_rgb(127,29,29)] tap-effect">HOST</button>
                <button onclick="startSession('guest')" class="bg-stone-800 text-white py-4 rounded-xl font-black shadow-[0_4px_0_rgb(28,25,23)] tap-effect">JOIN</button>
            </div>
        </div>
    </div>

    <div id="waiting-screen" class="hidden fixed inset-0 z-[60] bg-black/90 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-black text-white italic">AGUARDANDO SEGUNDO CHEF...</h2>
        <p class="text-stone-500 text-xs mt-2">O jogo começará automaticamente quando o parceiro entrar.</p>
    </div>

    <div id="game-ui" class="flex-1 flex flex-col max-w-md mx-auto w-full relative h-full">
        <header class="flex justify-between items-center p-3 bg-black border-b border-red-900/30 pt-[calc(0.75rem+env(safe-area-inset-top))]">
            <div class="flex flex-col">
                <span id="wallet" class="text-xl font-black text-green-500 italic leading-none">R$ 0,00</span>
                <span id="multiplier" class="text-[9px] font-bold text-yellow-500 mt-1">COMBO: x1.0</span>
            </div>
            <div id="timer-display" class="text-xl font-black text-red-600 tabular-nums">00:00</div>
        </header>

        <div class="bg-red-950/20 border-b border-red-900/40 py-2 relative">
            <div id="order-progress" class="absolute top-0 left-0 h-1 bg-red-600 w-0 transition-all"></div>
            <div id="order-display" class="flex gap-1 justify-center items-center text-2xl h-10 overflow-hidden"></div>
        </div>

        <div class="p-2 border-b border-stone-900 bg-stone-900/10">
            <div id="assembly-table" class="h-14 flex items-center justify-center gap-1 p-1 rounded-xl border-2 border-dashed border-red-900/20 bg-black/40"></div>
        </div>

        <main class="flex-1 p-3 flex flex-col gap-2 overflow-hidden justify-center">
            <div id="grid-container" class="grid grid-cols-3 gap-2"></div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="clearTable()" class="bg-stone-800 text-stone-400 py-6 rounded-xl font-black tap-effect text-[12px] border-b-4 border-stone-950">LIXO 🗑️</button>
                <button id="btn-deliver" onclick="deliverOrder()" class="hidden bg-green-700 text-white py-6 rounded-xl font-black tap-effect text-[12px] border-b-4 border-green-900">SERVIR ⚡</button>
            </div>
            <p class="text-center text-[10px] text-stone-600 mt-4">Made By: @085_Teuzinnn</p>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, runTransaction, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCLYv-SkQEJyQ1m5rGzLXREOLdQobRm8Xg", authDomain: "culinaria-coop.firebaseapp.com", projectId: "culinaria-coop", storageBucket: "culinaria-coop.firebasestorage.app", messagingSenderId: "356955389257", appId: "1:356955389257:web:b89c644561cc66627aae98" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let roomRef, myRole, currentOrder = null, tableItems = [], wallet = 0, combo = 1, timerInt, gameStarted = false;
        
        const sfx = { 
            cook: new Audio('torrando.mp3'), 
            cut: new Audio('cortando.mp3')
        };

        const prices = { '🍞': 2, '🧃': 5, '🍹': 7, '🥤': 5, '🥃': 8, '🍺': 6, '🧋': 7, '🥛': 4, '🍵': 4, '🥩': 12, '🥓': 10, '🥚': 7, '🍅': 5, '🧅': 5, '🫑': 4.5, '🧄': 4, '🧀': 6, '🥬': 3 };
        const drinks = ['🧃', '🍹', '🥤', '🥃', '🍺', '🧋', '🥛', '🍵'];
        const hostItems = ['🍞', ...drinks];
        const guestItems = [ { e: '🥩', a: '🔥' }, { e: '🥚', a: '🔥' }, { e: '🥓', a: '🔥' }, { e: '🍅', a: '🔪' }, { e: '🧅', a: '🔪' }, { e: '🧄', a: '🔪' }, { e: '🧀', a: '🔪' }, { e: '🥬', a: '🔪' }, { e: '🫑', a: '🔪' } ];

        window.showToast = (msg, type = 'info') => {
            const container = document.getElementById('toast-container'), toast = document.createElement('div');
            toast.className = `px-6 py-3 rounded-full font-black text-[10px] tracking-widest shadow-lg ${type === 'success' ? 'bg-green-600' : 'bg-red-700'}`;
            toast.innerText = msg.toUpperCase(); container.appendChild(toast); setTimeout(() => toast.remove(), 1500);
        };

        window.startSession = async (role) => {
            const name = document.getElementById('room-name').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!name) return showToast("SALA INVÁLIDA", "error");
            myRole = role; roomRef = ref(db, 'hard_rooms/' + name);
            
            if (role === 'host') {
                await set(roomRef, { wallet: 100, table: [], order: null, combo: 1, hostPresent: true, guestPresent: false });
                onDisconnect(ref(db, `hard_rooms/${name}/hostPresent`)).set(false);
            } else {
                const s = await get(roomRef);
                if (!s.exists()) return showToast("COZINHA INEXISTENTE", "error");
                await update(roomRef, { guestPresent: true });
                onDisconnect(ref(db, `hard_rooms/${name}/guestPresent`)).set(false);
            }

            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                
                if (data.hostPresent && data.guestPresent) {
                    if (!gameStarted) startGame();
                    wallet = data.wallet; tableItems = data.table || []; combo = data.combo;
                    if (data.order && (!currentOrder || data.order.id !== currentOrder.id)) {
                        currentOrder = data.order; startTimer(currentOrder.limit);
                    }
                    if (wallet <= 0) { alert("FALÊNCIA!"); location.reload(); }
                    renderState();
                } else {
                    document.getElementById('waiting-screen').classList.remove('hidden');
                    gameStarted = false;
                    clearInterval(timerInt);
                }
            });
        };

        function startGame() {
            gameStarted = true;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('waiting-screen').classList.add('hidden');
            if(myRole === 'host') {
                document.getElementById('btn-deliver').classList.remove('hidden');
                generateOrder();
            }
            renderGrid();
        }

        function startTimer(limit) {
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                const diff = limit - Date.now();
                if (diff <= 0) { clearInterval(timerInt); if(myRole === 'host') failOrder(); }
                else {
                    const sec = Math.ceil(diff / 1000);
                    document.getElementById('timer-display').innerText = `00:${sec < 10 ? '0'+sec : sec}`;
                    document.getElementById('order-progress').style.width = `${(diff/22000)*100}%`;
                    document.body.classList.toggle('panic-mode', sec < 6);
                }
            }, 200);
        }

        async function failOrder() {
            await runTransaction(roomRef, (d) => { if (d) { d.wallet = Math.max(0, d.wallet - 35); d.combo = 1; d.order = null; d.table = []; } return d; });
            generateOrder();
        }

        function generateOrder() {
            const ings = ['🥩', '🥚', '🥓', '🍅', '🧅', '🧄', '🧀', '🥬', '🫑'];
            let items = ['🍞'];
            const count = Math.floor(Math.random() * 3) + 2;
            for(let i=0; i<count; i++) items.push(ings[Math.floor(Math.random() * ings.length)]);
            items.push('🍞');
            const drink = Math.random() < 0.4 ? drinks[Math.floor(Math.random() * drinks.length)] : null;
            update(roomRef, { order: { items, drink, id: Date.now(), limit: Date.now() + 22000 }, table: [] });
        }

        function renderState() {
            document.getElementById('wallet').innerText = `R$ ${wallet.toFixed(2)}`;
            document.getElementById('multiplier').innerText = `COMBO: x${combo.toFixed(1)}`;
            const orderBox = document.getElementById('order-display');
            if (currentOrder) {
                let html = currentOrder.items.map(i => `<span>${i}</span>`).join('');
                if(currentOrder.drink) html += `<span class="ml-2 border-l border-red-500 pl-2 text-yellow-400">${currentOrder.drink}</span>`;
                orderBox.innerHTML = html;
            }
            document.getElementById('assembly-table').innerHTML = tableItems.map(i => `<span class="text-3xl">${i}</span>`).join('');
        }

        function renderGrid() {
            const container = document.getElementById('grid-container'); container.innerHTML = '';
            const items = myRole === 'host' ? hostItems : guestItems;
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "bg-stone-900 border-b-4 border-black h-[75px] rounded-xl text-3xl flex items-center justify-center tap-effect relative overflow-hidden active:translate-y-1";
                const emoji = myRole === 'host' ? item : item.e;
                btn.innerHTML = `<div class="p-bar absolute bottom-0 left-0 h-full bg-white/10 w-0"></div><span class="z-10">${emoji}</span>`;
                btn.onclick = () => { myRole === 'host' ? addToTable(item) : processItem(item, btn); };
                container.appendChild(btn);
            });
        }

        function processItem(item, btn) {
            if (btn.disabled || tableItems.length >= 8 || tableItems.length === 0 || tableItems.filter(i => i === '🍞').length >= 2) return;
            btn.disabled = true;
            const isCook = item.a === '🔥';
            const duration = isCook ? 3500 : 1500;
            const bar = btn.querySelector('.p-bar'), span = btn.querySelector('span'), orig = item.e;
            
            if (isCook) sfx.cook.play(); else sfx.cut.play();
            
            span.innerText = item.a; bar.style.transitionDuration = `${duration}ms`;
            setTimeout(() => bar.style.width = '100%', 50);
            setTimeout(() => { addToTable(orig); bar.style.transitionDuration = '0ms'; bar.style.width = '0'; span.innerText = orig; btn.disabled = false; }, duration);
        }

        async function addToTable(item) {
            if (tableItems.length >= 8) return;
            await runTransaction(ref(db, `hard_rooms/${roomRef.key}/table`), (t) => {
                t = t || [];
                if (t.length >= 8) return t;
                const breads = t.filter(x => x === '🍞').length;
                if (myRole === 'host') {
                    if (item === '🍞' && (t.length !== 0 && (breads !== 1 || t.length < 2))) return t;
                    if (drinks.includes(item) && (breads < 2 || t.some(x => drinks.includes(x)))) return t;
                }
                t.push(item); return t;
            });
        }

        window.clearTable = async () => {
            if (tableItems.length === 0) return;
            await runTransaction(roomRef, (d) => { if (d) { d.wallet = Math.max(0, d.wallet - (d.table.length * 3)); d.table = []; d.combo = 1; } return d; });
        };

        window.deliverOrder = async () => {
            if (!currentOrder || tableItems.length < 2) return;
            const tFill = tableItems.filter(i => i !== '🍞' && !drinks.includes(i)).sort();
            const oFill = currentOrder.items.filter(i => i !== '🍞').sort();
            const tDrink = tableItems.filter(i => drinks.includes(i))[0] || null;
            const isOk = tableItems[0] === '🍞' && tableItems.filter(x => x === '🍞').length === 2 && JSON.stringify(tFill) === JSON.stringify(oFill) && tDrink === currentOrder.drink;
            
            if (isOk) {
                const gain = tableItems.reduce((acc, i) => acc + (prices[i] || 0), 0) * combo;
                await runTransaction(roomRef, (d) => { if (d) { d.wallet += gain; d.table = []; d.order = null; d.combo = Math.min(d.combo + 0.1, 3); } return d; });
                generateOrder();
            } else {
                await runTransaction(roomRef, (d) => { if (d) { d.wallet = Math.max(0, d.wallet - 15); d.combo = 1; } return d; });
            }
        };
    </script>
</body>
</html>
