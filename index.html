<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Culinária Sob Pressão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: sans-serif; }
        .kitchen-gradient { background: linear-gradient(180deg, #2d3436 0%, #000000 100%); }
        .counter-top { background: #535c68; border-top: 4px solid #95afc0; }
        .flying-item { animation: flyUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(0); opacity: 0; }
        }
        #timer-fill { transition: width 0.1s linear; }
    </style>
</head>
<body class="kitchen-gradient h-screen text-white overflow-hidden select-none">

    <div id="setup" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-zinc-900 p-8 text-center">
        <h1 class="text-3xl font-black text-orange-500 mb-2 italic">CULINÁRIA SOB PRESSÃO</h1>
        <p class="text-zinc-400 text-sm mb-8">Single Page Mobile Multiplayer</p>
        <div id="status" class="mb-4 text-orange-400 font-mono text-xs uppercase tracking-widest">Aguardando PeerJS...</div>
        <div id="host-controls" class="w-full space-y-4">
            <div class="bg-zinc-800 p-4 rounded-lg border border-zinc-700">
                <span class="text-xs block mb-2">SEU ID (COMPARTILHE):</span>
                <div id="my-id" class="text-xl font-bold tracking-tighter text-blue-400 mb-4 break-all">...</div>
                <button onclick="copyID()" class="w-full bg-blue-600 py-3 rounded-lg font-bold active:scale-95 transition-transform">COPIAR ID</button>
            </div>
            <div class="py-4 text-zinc-500">OU</div>
            <input id="join-id" type="text" placeholder="ID do Parceiro" class="w-full p-4 bg-zinc-800 rounded-lg border border-zinc-700 text-center outline-none focus:border-orange-500 text-white">
            <button onclick="connectToPeer()" class="w-full bg-orange-600 py-3 rounded-lg font-bold active:scale-95 transition-transform">CONECTAR NA COZINHA</button>
        </div>
    </div>

    <div id="game" class="hidden h-screen flex flex-col">
        <div class="h-[15%] bg-black/40 flex items-center justify-between px-6 border-b-2 border-orange-500/30">
            <div class="text-left leading-none">
                <span class="text-[10px] text-zinc-400 uppercase">Pontos</span>
                <div id="score" class="text-2xl font-black text-orange-500">0</div>
            </div>
            <div class="flex flex-col items-end gap-1">
                <span class="text-[10px] text-zinc-400 uppercase">Tempo do Cliente</span>
                <div id="timer-bar" class="w-32 h-3 bg-zinc-800 rounded-full overflow-hidden border border-white/10">
                    <div id="timer-fill" class="h-full bg-green-500 w-full"></div>
                </div>
            </div>
        </div>

        <div class="h-[25%] flex flex-col items-center justify-center bg-zinc-800 relative">
            <div class="absolute -top-3 px-3 py-1 bg-orange-600 rounded text-[10px] font-bold uppercase tracking-tighter shadow-lg">Pedido Ativo</div>
            <div class="flex items-center gap-2 bg-white/10 p-4 rounded-xl border border-white/20">
                <div id="order-box" class="text-3xl filter drop-shadow-md tracking-widest"></div>
                <div class="text-xl text-zinc-500">=</div>
                <div class="text-4xl">🥪</div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center p-4">
            <div class="w-full max-w-xs aspect-video counter-top rounded-xl shadow-2xl relative flex flex-col items-center justify-center">
                <div class="absolute -top-8 text-[10px] font-bold text-zinc-400 uppercase tracking-widest italic">Mesa de Montagem</div>
                <div id="plate" class="text-4xl flex gap-1 flex-wrap justify-center p-2 min-h-[50px]"></div>
                <div id="anim-layer" class="absolute inset-0 pointer-events-none overflow-visible"></div>
            </div>
        </div>

        <div class="h-[35%] bg-zinc-900 border-t-4 border-zinc-800 p-4 flex flex-col gap-4">
            <div id="role-tag" class="text-center text-[10px] font-bold text-zinc-500 uppercase tracking-widest italic"></div>
            <div id="hud-buttons" class="flex justify-center gap-4 h-full"></div>
            <div class="text-center text-[10px] text-zinc-600 font-bold uppercase">Entrega automática ao completar!</div>
        </div>
    </div>

    <script>
        let peer = new Peer();
        let conn = null;
        let role = ''; 
        let score = 0;
        let currentPlate = [];
        let currentOrder = [];
        let timeLeft = 10;
        let timerInterval = null;

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status').innerText = 'ID Gerado. Pronto!';
        });

        peer.on('connection', c => {
            conn = c;
            role = 'HOST';
            initGame();
        });

        function connectToPeer() {
            const id = document.getElementById('join-id').value;
            if(!id) return;
            conn = peer.connect(id);
            role = 'GUEST';
            initGame();
        }

        function copyID() {
            navigator.clipboard.writeText(document.getElementById('my-id').innerText);
            alert("ID Copiado!");
        }

        function initGame() {
            conn.on('open', () => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                setupHUD();
                if(role === 'HOST') nextOrder();
            });

            conn.on('data', data => {
                if(data.type === 'SYNC_ORDER') {
                    currentOrder = data.order;
                    currentPlate = [];
                    timeLeft = 10;
                    renderOrder();
                    renderPlate();
                    startTimer();
                }
                if(data.type === 'ADD_PLATE') {
                    currentPlate.push(data.item);
                    renderPlate();
                    checkOrder();
                }
                if(data.type === 'SYNC_SCORE') {
                    score = data.score;
                    document.getElementById('score').innerText = score;
                }
                if(data.type === 'TIME_OUT') {
                    handleTimeOut();
                }
            });
        }

        function setupHUD() {
            const container = document.getElementById('hud-buttons');
            const items = role === 'HOST' ? ['🍞', '🧀'] : ['🥬', '🍅', '🔥'];
            document.getElementById('role-tag').innerText = `Você é o ${role === 'HOST' ? 'Cozinheiro A' : 'Cozinheiro B'}`;
            
            items.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = "flex-1 bg-zinc-700 rounded-2xl text-4xl shadow-[0_4px_0_0_#18181b] active:translate-y-1 active:shadow-none transition-all";
                btn.innerHTML = emoji;
                btn.onclick = () => throwItem(emoji);
                container.appendChild(btn);
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            const fill = document.getElementById('timer-fill');
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / 10) * 100;
                fill.style.width = `${percentage}%`;
                
                if (percentage < 30) fill.className = "h-full bg-red-500 w-full";
                else if (percentage < 60) fill.className = "h-full bg-yellow-500 w-full";
                else fill.className = "h-full bg-green-500 w-full";

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if(role === 'HOST') handleTimeOut();
                }
            }, 100);
        }

        function handleTimeOut() {
            score -= 5;
            document.getElementById('score').innerText = score;
            if(role === 'HOST') {
                conn.send({ type: 'TIME_OUT' });
                conn.send({ type: 'SYNC_SCORE', score: score });
                setTimeout(nextOrder, 1000);
            }
            alert("O cliente cansou de esperar! (-5)");
        }

        function throwItem(emoji) {
            const anim = document.createElement('div');
            anim.className = "absolute left-1/2 bottom-0 text-4xl flying-item";
            anim.innerText = emoji;
            document.getElementById('anim-layer').appendChild(anim);
            setTimeout(() => anim.remove(), 600);

            currentPlate.push(emoji);
            renderPlate();
            conn.send({ type: 'ADD_PLATE', item: emoji });
            checkOrder();
        }

        function checkOrder() {
            if (currentPlate.length >= currentOrder.length) {
                const plateStr = currentPlate.slice().sort().join('');
                const orderStr = currentOrder.slice().sort().join('');
                
                if (plateStr === orderStr) {
                    clearInterval(timerInterval);
                    score += 5;
                    document.getElementById('score').innerText = score;
                    alert("Perfeito! Pedido entregue. (+5)");
                    if(role === 'HOST') {
                        conn.send({ type: 'SYNC_SCORE', score: score });
                        setTimeout(nextOrder, 500);
                    }
                } else if (currentPlate.length >= currentOrder.length + 1) {
                    // Se passar do número de ingredientes e estiver errado
                    clearInterval(timerInterval);
                    score -= 5;
                    document.getElementById('score').innerText = score;
                    alert("Erraram a receita! Cliente bravo. (-5)");
                    if(role === 'HOST') {
                        conn.send({ type: 'SYNC_SCORE', score: score });
                        setTimeout(nextOrder, 500);
                    }
                }
            }
        }

        function nextOrder() {
            const pool = ['🧀', '🥬', '🍅'];
            let newOrder = ['🍞', '🔥']; 
            const extraCount = Math.floor(Math.random() * 2) + 1;
            for(let i=0; i<extraCount; i++) {
                newOrder.push(pool[Math.floor(Math.random()*pool.length)]);
            }
            currentOrder = newOrder;
            currentPlate = [];
            timeLeft = 10;
            
            conn.send({ type: 'SYNC_ORDER', order: currentOrder });
            renderOrder();
            renderPlate();
            startTimer();
        }

        function renderOrder() {
            document.getElementById('order-box').innerText = currentOrder.join('');
        }

        function renderPlate() {
            document.getElementById('plate').innerText = currentPlate.join('');
        }
    </script>
</body>
</html>
