<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zen Kitchen Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { touch-action: manipulation; font-family: 'Inter', system-ui, sans-serif; background: #0f172a; color: #f8fafc; overflow: hidden; height: 100vh; }
        .app-container { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); height: 100%; display: flex; flex-direction: column; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .star-active { color: #fbbf24; filter: drop-shadow(0 0 5px #fbbf24); }
        .star-off { color: #334155; }
        .ing-btn { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border-radius: 1.25rem; background: #1e293b; border: 2px solid #334155; transition: all 0.1s; }
        .ing-btn:active { background: #334155; transform: scale(0.95); }
        .order-anim { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .cooking-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); } 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }
    </style>
</head>
<body class="select-none">

    <div id="lobby" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 text-center bg-slate-900">
        <div class="mb-8">
            <h1 class="text-4xl font-light tracking-widest text-white">ZEN<span class="font-bold text-orange-400">KITCHEN</span></h1>
            <p class="text-slate-400 text-sm mt-2">Culinária em Harmonia</p>
        </div>
        
        <div class="glass p-6 rounded-3xl w-full max-w-sm">
            <div id="my-id" class="bg-slate-950/50 p-4 rounded-xl font-mono text-blue-400 text-sm mb-4 break-all">Gerando ID...</div>
            <button onclick="copyLink()" id="btn-copy" class="w-full py-3 bg-slate-800 rounded-xl font-bold text-sm mb-6 border border-slate-700">Convidar Parceiro</button>
            
            <input id="join-id" type="text" placeholder="ID do Amigo" class="w-full p-4 bg-slate-950 rounded-xl text-center outline-none border border-slate-800 focus:border-orange-500 mb-3 transition-all">
            <button id="btn-connect" class="w-full py-4 bg-orange-500 rounded-xl font-bold text-lg hover:bg-orange-600 transition-colors">Entrar na Cozinha</button>
        </div>
    </div>

    <div id="game" class="hidden app-container max-w-lg mx-auto w-full p-4">
        <header class="flex flex-col gap-4 mb-6">
            <div class="flex justify-between items-center">
                <div class="flex gap-1" id="stars-container">
                    <span class="star-off text-2xl">★</span>
                    <span class="star-off text-2xl">★</span>
                    <span class="star-off text-2xl">★</span>
                </div>
                <div class="text-right">
                    <div id="score" class="text-2xl font-bold text-white leading-none">0</div>
                    <div class="text-[10px] text-slate-400 uppercase tracking-widest">Pontos Totais</div>
                </div>
            </div>
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="star-progress" class="bg-orange-400 h-full w-0 transition-all duration-500"></div>
            </div>
        </header>

        <div id="order-card" class="glass rounded-3xl p-6 flex flex-col items-center justify-center min-h-[120px] mb-6 relative overflow-hidden">
            <div class="text-[10px] uppercase tracking-[0.2em] text-orange-400 font-bold mb-3">Pedido Recebido</div>
            <div id="order-items" class="flex gap-2 text-3xl"></div>
        </div>

        <main class="flex-1 flex flex-col gap-6">
            <div id="work-zone" class="glass rounded-3xl p-4 flex flex-col items-center justify-between min-h-[200px]">
                <div id="role-label" class="text-[10px] uppercase font-bold text-slate-500">Aguardando...</div>
                
                <div id="plate-display" class="text-4xl flex gap-1 h-16 items-center justify-center"></div>

                <div id="oven-timer" class="hidden flex flex-col items-center">
                    <div class="text-orange-500 font-bold text-xs uppercase mb-1">Cozinhando...</div>
                    <div class="w-32 bg-slate-950 h-1.5 rounded-full overflow-hidden">
                        <div id="oven-fill" class="bg-orange-500 h-full w-0"></div>
                    </div>
                </div>

                <button id="main-action" class="w-full py-3 rounded-2xl bg-orange-500/10 border border-orange-500/30 text-orange-500 font-bold text-xs uppercase tracking-widest disabled:opacity-30">
                    Finalizar no Forno
                </button>
            </div>

            <div id="controls" class="grid grid-cols-4 gap-3 pb-4"></div>
        </main>
    </div>

    <script>
        const peer = new Peer();
        let conn = null, role = '', currentOrder = [], currentPlate = [];
        let score = 0, isCooking = false;

        const POOL = ['🥩', '🍅', '🧅', '🥬'];
        const STAR_GOALS = [50, 150, 300];

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('join')) connectToPeer(urlParams.get('join'));
        });

        function copyLink() {
            const link = `${window.location.origin}${window.location.pathname}?join=${document.getElementById('my-id').innerText}`;
            navigator.clipboard.writeText(link);
            document.getElementById('btn-copy').innerText = "Link Copiado!";
        }

        function connectToPeer(id) {
            conn = peer.connect(id); role = 'GUEST'; setupConnection();
        }

        document.getElementById('btn-connect').onclick = () => connectToPeer(document.getElementById('join-id').value);
        peer.on('connection', c => { conn = c; role = 'HOST'; setupConnection(); });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                initUI();
                if(role === 'HOST') createOrder();
            });

            conn.on('data', data => {
                if(data.type === 'SYNC') {
                    currentOrder = data.order;
                    currentPlate = data.plate;
                    score = data.score;
                    isCooking = data.isCooking;
                    updateUI();
                }
                if(role === 'HOST' && data.type === 'ACTION') handleAction(data.item);
            });
        }

        function initUI() {
            const ctrls = document.getElementById('controls');
            const items = role === 'GUEST' ? POOL : ['🍞', '🥤'];
            ctrls.innerHTML = '';
            items.forEach(item => {
                const b = document.createElement('button');
                b.className = 'ing-btn';
                b.innerHTML = item;
                b.onclick = () => {
                    if(role === 'GUEST') conn.send({type: 'ACTION', item});
                    else handleAction(item);
                };
                ctrls.appendChild(b);
            });

            document.getElementById('role-label').innerText = role === 'HOST' ? 'Chef de Montagem' : 'Chef de Preparo';
            document.getElementById('main-action').style.display = role === 'HOST' ? 'block' : 'none';
            document.getElementById('main-action').onclick = startOven;
        }

        function handleAction(item) {
            if(isCooking) return;
            currentPlate.push(item);
            sync();
        }

        function createOrder() {
            const rand = Math.random();
            let ings = [];
            let size = rand < 0.25 ? 2 : (rand < 0.5 ? 3 : 4);
            
            ings.push('🍞');
            for(let i=0; i<size; i++) ings.push(POOL[Math.floor(Math.random()*POOL.length)]);
            ings.push('🍞');
            if(Math.random() < 0.25) ings.push('🥤');
            
            currentOrder = ings;
            currentPlate = [];
            sync();
        }

        function startOven() {
            if(currentPlate.join('') !== currentOrder.join('') || isCooking) return;
            isCooking = true;
            let p = 0;
            const step = 100 / 30; 
            sync();

            const interval = setInterval(() => {
                p += step;
                document.getElementById('oven-fill').style.width = p + '%';
                if(p >= 100) {
                    clearInterval(interval);
                    completeOrder();
                }
            }, 100);
        }

        function completeOrder() {
            score += (currentOrder.length * 10);
            isCooking = false;
            createOrder();
        }

        function sync() {
            if(role === 'HOST' && conn.open) {
                conn.send({ type: 'SYNC', order: currentOrder, plate: currentPlate, score: score, isCooking: isCooking });
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('order-items').innerHTML = currentOrder.map(i => `<span>${i}</span>`).join('');
            document.getElementById('plate-display').innerHTML = currentPlate.map(i => `<span>${i}</span>`).join('');
            document.getElementById('score').innerText = score;
            
            const actionBtn = document.getElementById('main-action');
            actionBtn.disabled = (currentPlate.join('') !== currentOrder.join('') || isCooking);
            
            document.getElementById('oven-timer').classList.toggle('hidden', !isCooking);
            if(isCooking) document.getElementById('work-zone').classList.add('cooking-pulse');
            else document.getElementById('work-zone').classList.remove('cooking-pulse');

            const nextGoal = STAR_GOALS[2];
            const percent = Math.min(100, (score / nextGoal) * 100);
            document.getElementById('star-progress').style.width = percent + '%';

            const stars = document.getElementById('stars-container').children;
            STAR_GOALS.forEach((goal, i) => {
                stars[i].className = score >= goal ? 'star-active text-2xl' : 'star-off text-2xl';
            });
        }
    </script>
</body>
</html>
